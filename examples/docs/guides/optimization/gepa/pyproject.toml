[project]
name = "tensorzero-examples-docs-guides-optimization-gepa"
version = "0.0.0"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openai>=2.6.1",
    "pandas>=2.3.3",
    "tensorzero",
    "tqdm>=4.66.0",
]

[dependency-groups]
dev = [
    "pyright>=1.1.0",
]

# TODO: Pin tensorzero to a released version once one is available with experimental_launch_optimization_workflow
[tool.uv.sources]
tensorzero = { git = "https://github.com/tensorzero/tensorzero", rev = "beca3fd03", subdirectory = "clients/python" }
