[project]
name = "tensorzero-examples-chess-puzzles"
version = "0.0.0"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "altair",
    "chess",
    "ipykernel",
    "numpy",
    "pandas",
    "tensorzero",
    "tqdm",
]

[tool.uv]
exclude-newer = "3 days"
exclude-newer-package = { tensorzero = false }
