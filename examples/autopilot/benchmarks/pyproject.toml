[project]
name = "autopilot-benchmarks"
version = "0.1.0"
description = "Benchmark harness for TensorZero Autopilot"
requires-python = ">=3.13"
dependencies = [
    "tensorzero>=2026.2.2",
    "llmgym",
    "httpx>=0.27",
    "httpx-sse>=0.4",
    "asyncpg>=0.30",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "click>=8.0",
]

[project.scripts]
autopilot-benchmark = "autopilot_benchmarks.cli:main"

[tool.uv.sources]
llmgym = { git = "https://github.com/tensorzero/llmgym.git", rev = "16ac7c5c98daf56fce9defd90f8b9e5db586a981" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autopilot_benchmarks"]
