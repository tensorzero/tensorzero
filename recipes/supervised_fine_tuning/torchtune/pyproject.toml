[project]
name = "tensorzero-recipe-sft-torchtune"
version = "0.0.0"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "clickhouse-connect",
    "ipykernel",
    "ipywidgets",
    "minijinja",
    "notebook",
    "numpy",
    "pandas",
    "tensorzero",
    "toml",
    "torchao",
    "torch",
    "torchvision",
]

[tool.uv]
exclude-newer = "3 days"
exclude-newer-package = { tensorzero = false }
override-dependencies = [
    "pillow>=12.1.1",
]
