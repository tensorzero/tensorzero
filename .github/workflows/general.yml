      S3_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}

  check-production-deployment-docker-compose:
    needs: [build-gateway-container]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.repository == 'tensorzero/tensorzero' && github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: tensorzero
          password: ${{ secrets.DOCKERHUB_LIMITED_TOKEN }}

      - name: Pull and retag gateway container
        run: |
          ./ci/docker-pull-with-retry.sh \
            tensorzero/gateway-dev:sha-${{ github.sha }}
          docker tag tensorzero/gateway-dev:sha-${{ github.sha }} tensorzero/gateway:latest

      - name: Launch ClickHouse container for E2E tests
        run: |
          docker compose -f crates/tensorzero-core/tests/e2e/docker-compose.yml up clickhouse -d --wait

      - name: Set up .env file for production deployment tests
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > ci/check-production-deployment-docker-compose/.env
          echo "TENSORZERO_CLICKHOUSE_URL=http://chuser:chpassword@host.docker.internal:8123/tensorzero" >> ci/check-production-deployment-docker-compose/.env
          echo "TENSORZERO_DISABLE_PSEUDONYMOUS_USAGE_ANALYTICS=1" >> ci/check-production-deployment-docker-compose/.env

      - name: Run docker compose for production deployment tests
        run: docker compose -f ci/check-production-deployment-docker-compose/docker-compose.yml up -d --wait

      - name: Run inference for production deployment tests
        run: ci/check-production-deployment-docker-compose/run.sh

      - name: Print Docker compose logs
        if: always()
        run: |
          docker compose -f ci/check-production-deployment-docker-compose/docker-compose.yml logs -t

      - name: Take down docker compose for production deployment tests
        run: |
          docker compose -f ci/check-production-deployment-docker-compose/docker-compose.yml down
          docker compose -f crates/tensorzero-core/tests/e2e/docker-compose.yml down

  live-tests:
    if: ${{ needs.detect-changes.outputs.live-tests == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
    needs:
      [
        detect-changes,
        build-gateway-container,
        build-gateway-e2e-container,
        build-fixtures-container,
        build-provider-proxy-container,
        build-live-tests-container,
      ]
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/live-tests.yml
    secrets: inherit

  inference-cache-tests:
    if: ${{ needs.detect-changes.outputs.code == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
    needs:
      [
        detect-changes,
        build-gateway-container,
        build-live-tests-container,
        build-provider-proxy-container,
      ]
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/inference-cache-tests.yml
    secrets: inherit

  client-tests:
    if: ${{ needs.detect-changes.outputs.client-tests == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
    needs:
      [
        detect-changes,
        build-gateway-container,
        build-gateway-e2e-container,
        build-mock-provider-api-container,
        build-fixtures-container,
        build-provider-proxy-container,
      ]
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/client-tests.yml
    secrets: inherit

  k3d:
    needs: [build-gateway-container, build-ui-container]
    permissions:
      contents: read
    uses: ./.github/workflows/k3d.yml
    secrets:
      DOCKERHUB_LIMITED_TOKEN: ${{ secrets.DOCKERHUB_LIMITED_TOKEN }}

  mocked-batch-tests:
    permissions:
      contents: read
      actions: read
    if: github.repository == 'tensorzero/tensorzero' && github.event_name == 'merge_group'
    uses: ./.github/workflows/mocked-batch-test.yml
    needs: [build-gateway-container, build-mock-provider-api-container]
    secrets: inherit

  autopilot-e2e:
    permissions:
      contents: read
    if: needs.detect-changes.outputs.code == 'true' && github.repository == 'tensorzero/tensorzero' && github.event_name == 'merge_group'
    needs: [detect-changes, build-gateway-e2e-container, build-ui-container]
    uses: ./.github/workflows/dispatch-autopilot-e2e.yml
    secrets:
      AUTOPILOT_DISPATCH_APP_ID: ${{ secrets.AUTOPILOT_DISPATCH_APP_ID }}
      AUTOPILOT_DISPATCH_PRIVATE_KEY: ${{ secrets.AUTOPILOT_DISPATCH_PRIVATE_KEY }}

  check-docs-broken-links:
    needs: [detect-changes]
    if: github.repository == 'tensorzero/tensorzero' && needs.detect-changes.outputs.docs == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: "24.13.0"

      - name: Install pnpm
        run: |
          for attempt in 1 2 3; do
            if npm install -g pnpm@10.15.0; then
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "Failed to install pnpm after 3 attempts"
              exit 1
            fi
            sleep $((10 * attempt))
          done

      - name: Install dependencies
        working-directory: docs
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "Failed to install docs dependencies after 3 attempts"
              exit 1
            fi
            sleep $((10 * attempt))
          done

      - name: Check for broken links
        working-directory: docs
        run: pnpm exec mint broken-links --check-anchors

  # See 'ci/README.md' at the repository root for more details.
  # This job queries the GitHub API for all jobs in this workflow run and asserts
  # that they all passed, except for jobs in the ALLOWED_FAIL and ALLOWED_SKIP
  # lists defined in ci/check-all-general-jobs-passed.sh.
  # The `needs` list below is for scheduling only (so this job waits for others
  # to finish). The actual pass/fail logic is in the script.
  check-all-general-jobs-passed:
    permissions:
      actions: read
      contents: read
    if: always() && github.repository == 'tensorzero/tensorzero'
    needs:
      [
        detect-changes,
        autopilot-e2e,
        build-gateway-container,
        build-gateway-e2e-container,
        build-live-tests-container,
        build-mock-provider-api-container,
        build-provider-proxy-container,
        build-ui-container,
        build-windows,
        check-docker-compose-commit,
        check-docker-compose-released,
        check-docs-broken-links,
        check-node-bindings,
        check-production-deployment-docker-compose,
        check-python-client-build,
        check-python-schemas,
        check-version-consistency,
        clickhouse-tests,
        client-tests,
        endpoint-tests,
        inference-cache-tests,
        lint-rust,
        live-tests,
        k3d,
        mock-optimization-tests,
        mocked-batch-tests,
        postgres-tests,
        rust-build,
        rust-test,
        ui-tests,
        ui-tests-e2e,
        validate,
        validate-node,
        validate-python,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          sparse-checkout: ci/check-all-general-jobs-passed.sh
          sparse-checkout-cone-mode: false
      - name: Check all jobs passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./ci/check-all-general-jobs-passed.sh
