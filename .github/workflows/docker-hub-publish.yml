# This workflow publishes production Docker images only via manual dispatch.
# It is intended to be paired with a protected GitHub environment named
# `docker-prod-publish` that holds the production Docker Hub token.
#
# SECURITY NOTE: Public release images should not reuse remote build caches.
name: Publish production Docker images

run-name: Publish production Docker images for ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (for example `2026.4.0`)"
        type: string
        required: true
      publish_latest:
        description: "Also publish the `latest` tag"
        type: boolean
        required: false
        default: false

concurrency:
  group: docker-prod-publish-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  DOCKERHUB_USER: tensorzero

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    if: github.repository == 'tensorzero/tensorzero'
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag format and existence
        id: validate
        run: |
          release_tag='${{ inputs.release_tag }}'
          default_branch='${{ github.event.repository.default_branch }}'

          if [ "${GITHUB_REF_TYPE}" != "branch" ] || [ "${GITHUB_REF_NAME}" != "${default_branch}" ]; then
            echo "This workflow must be dispatched from the ${default_branch} branch"
            exit 1
          fi

          if ! [[ "${release_tag}" =~ ^[0-9]{4}\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match YYYY.M.PATCH, for example 2026.4.0"
            exit 1
          fi

          git fetch --force origin "${default_branch}"
          git fetch --force --tags origin
          if ! git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "Tag ${release_tag} does not exist in the repository"
            exit 1
          fi

          if ! git merge-base --is-ancestor "refs/tags/${release_tag}" "origin/${default_branch}"; then
            echo "Tag ${release_tag} is not reachable from ${default_branch}"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push Docker image to Docker Hub
    needs: [validate-release-tag]
    runs-on: ${{ matrix.platform.runner }}
    if: github.repository == 'tensorzero/tensorzero'
    environment: docker-prod-publish
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: linux/amd64
          - runner: ubuntu-24.04-arm
            target: linux/arm64
        container:
          - name: ui
            path: ui
          - name: gateway
            path: crates/gateway
          - name: evaluations
            path: crates/evaluations

    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.validate-release-tag.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare
        run: |
          platform=${{ matrix.platform.target }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Install Namespace CLI
        uses: namespacelabs/nscloud-setup@f378676225212387f1283f4da878712af2c4cd60 # v0.0.11

      - name: Configure Namespace-powered Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@91c2e6537780e3b092cb8476406be99a8f91bd5e # v0.0.20
        with:
          wait-for-builder: true

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.DOCKERHUB_USER }}/${{ matrix.container.name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          platforms: ${{ matrix.platform.target }}
          file: ./${{ matrix.container.path }}/Dockerfile
          # This is required to make `.git` available in the build context:
          # https://github.com/docker/build-push-action/issues/513#issuecomment-987951050
          context: .
          push: true
          provenance: mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.DOCKERHUB_USER }}/${{ matrix.container.name }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          no-cache: true
          build-args: |
            PROFILE=performance
            DEBUG_BUILD=0

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: digests-${{ matrix.container.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    permissions:
      actions: read
      contents: read
    if: github.repository == 'tensorzero/tensorzero'
    needs:
      - validate-release-tag
      - build
    environment: docker-prod-publish
    strategy:
      matrix:
        container:
          - name: ui
          - name: gateway
          - name: evaluations
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.container.name }}-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.DOCKERHUB_USER }}/${{ matrix.container.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.validate-release-tag.outputs.release_tag }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${{ env.DOCKERHUB_USER }}/${MATRIX_CONTAINER_NAME}@sha256:%s " *)
        env:
          MATRIX_CONTAINER_NAME: ${{ matrix.container.name }}

      - name: Wait for image to be available on Docker Hub
        run: |
          IMAGE="${{ env.DOCKERHUB_USER }}/${MATRIX_CONTAINER_NAME}:${RELEASE_TAG}"
          echo "Waiting for ${IMAGE} to be available on Docker Hub..."
          for i in $(seq 1 30); do
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image ${IMAGE} is available on Docker Hub"
              exit 0
            fi
            echo "Attempt ${i}/30: Image not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for ${IMAGE} to appear on Docker Hub"
          exit 1
        env:
          MATRIX_CONTAINER_NAME: ${{ matrix.container.name }}
          RELEASE_TAG: ${{ needs.validate-release-tag.outputs.release_tag }}
